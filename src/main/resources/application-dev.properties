# ============================================================
# BudgetBot AI — Development Profile
# Activate: --spring.profiles.active=dev
# ============================================================

# DDL: let Hibernate manage schema automatically in dev
spring.jpa.hibernate.ddl-auto=update

# Show SQL + dialect warning suppression
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Verbose logging for dev
logging.level.com.budgetbot=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
