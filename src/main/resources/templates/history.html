<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>History – BudgetBot AI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="wrapper">
  <div th:replace="~{fragments/nav :: sidebar}"></div>

  <div id="content">
    <div class="page-header d-flex justify-content-between align-items-start">
      <div>
        <h1>Expense History</h1>
        <p>All your recorded expenses in one place.</p>
      </div>
      <a href="/expenses/new" class="btn btn-primary btn-sm">
        <i class="bi bi-plus-lg me-1"></i>Add Expense
      </a>
    </div>

    <!-- Filters -->
    <div class="card mb-4 p-3">
      <div class="row g-2 align-items-end">
        <div class="col-sm-4 col-md-3">
          <label class="form-label mb-1">Category</label>
          <select id="filter-category" class="form-select form-select-sm" onchange="applyFilters()">
            <option value="">All Categories</option>
            <option>Food</option>
            <option>Transport</option>
            <option>Shopping</option>
            <option>Bills</option>
            <option>Entertainment</option>
            <option>Health</option>
            <option>Education</option>
            <option>Others</option>
          </select>
        </div>
        <div class="col-sm-4 col-md-3">
          <label class="form-label mb-1">Source</label>
          <select id="filter-source" class="form-select form-select-sm" onchange="applyFilters()">
            <option value="">All Sources</option>
            <option value="WEB">Web</option>
            <option value="WHATSAPP">WhatsApp</option>
          </select>
        </div>
        <div class="col-sm-4 col-md-3">
          <label class="form-label mb-1">Search</label>
          <input type="text" id="filter-search" class="form-control form-control-sm"
                 placeholder="Search notes…" oninput="applyFilters()"/>
        </div>
        <div class="col-md-3 text-end">
          <button class="btn btn-sm btn-outline-secondary" onclick="resetFilters()">
            <i class="bi bi-arrow-counterclockwise me-1"></i>Reset
          </button>
          <span class="ms-2 small text-muted" id="result-count"></span>
        </div>
      </div>
    </div>

    <!-- Table -->
    <div class="card">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-clean mb-0">
            <thead>
              <tr>
                <th>Date</th>
                <th>Category</th>
                <th>Note</th>
                <th>Source</th>
                <th class="text-end">Amount</th>
              </tr>
            </thead>
            <tbody id="history-tbody">
              <tr><td colspan="5" class="text-center py-4 text-muted">Loading expenses…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
      <!-- Totals footer -->
      <div class="card-header border-top d-flex justify-content-between" id="totals-footer" style="display:none!important;">
        <span class="small text-muted" id="totals-count"></span>
        <span class="fw-700" id="totals-amount"></span>
      </div>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/history.js}"></script>
</body>
</html>
