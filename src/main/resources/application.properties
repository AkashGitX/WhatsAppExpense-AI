spring.application.name=BudgetChanger



# Server
server.port=8080


server.forward-headers-strategy=framework


twilio.skip-validation=false



spring.datasource.url=jdbc:postgresql://localhost:5432/wpbot
spring.datasource.username=postgres
spring.datasource.password=0983
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# JPA / Hibernate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
# Auto-update schema for new entity fields (overridden per profile if needed)
spring.jpa.hibernate.ddl-auto=update

# ============================================================
# Spring AI (OpenAI — gpt-4o-mini)
# ============================================================

spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.3
spring.ai.openai.chat.options.max-tokens=400
spring.ai.openai.chat.options.stream=false

# ============================================================
# Twilio
# ============================================================
twilio.account.sid=${TWILIO_ACCOUNT_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN}
twilio.whatsapp.number=${TWILIO_WHATSAPP_NUMBER:+14155238886}

# ============================================================
# JWT Security
# ============================================================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# ============================================================
# BudgetBot Business Config
# ============================================================
# Default monthly budget limit per user (₹20,000)
budgetbot.monthly-budget=20000

# ============================================================
# File Upload
# ============================================================
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=5MB
# Directory where profile images are stored (relative to working directory)
app.upload-dir=uploads
spring.profiles.active=${ENV:dev}

